body:
  text: 樂菴先生語錄後序樂菴先生享年七十有九閲天下之義理居多自其中年清修寡欲不啻如道人衲子静極而通故凡吾儒與佛老二氏所談性命之奥心融神㑹超然獨得推其餘波沾丐學者每語輒更僕不少倦盖以是為燕居之樂吾友龔君立道篤意於學従先生游者六年聞微言要指必書於策積之為五卷以示余余聞古人學道要必有所悟入顔子繇克己復禮悟曽子繇一以貫之悟近世如徐節孝繇莫安排而悟元城先生繇不妄語而悟然知道易蹈道難此四君子見於履踐者皆可攷也余觀先生始見趙公而悟於學而時習之之一言此其入道之門户至扵履踐之實又無愧於四君子者然則先生之學所謂非茍知之亦允蹈之者與其没也今翰林周公子充詒書所親曰樂菴臨行一著實是難學禪和子亦須服他盖尋常說時甚易臘月三十日直是不能謾人此老平生跌蕩到此乃得力可敬可羨翰林直道正學其言不妄故具著之學者欲知先生講學之妙是書固不可無欲知學力至到之地則觀諸翰林之言思過半矣淳熙五年八月二日河南呉仁傑謹序
