body:
  text: 樂菴語録卷二宋龔昱編人之行已在夫婦上不能盡道他無足觀矣詩三百篇可以厚人倫美教化等而上之又能動天地感鬼神推其原亦不過始於夫婦世有言西方凈土者先生曰東方南方北方無凈土邪夫子言非禮勿視非禮勿聴非禮勿言非禮勿動又曰毋意毋必毋固毋我勿也毋也皆禁止之辭未造乎時中之妙也時中之妙聖人罕言小人竊此則為無忌憚矣仁者覺也聲色之来我能覺則不為聲色所移貨利之来我能覺則不為貨利所溺若能随念而覺随事而覺去聖人不逺矣論語云君子無終食之間違仁此之謂也訟六五曰訟元吉六五得位居尊人豈得而訟之故諸儒皆以為聴訟之主聴訟者臣下之職非人君所當知也孔子曰吾未見能見其過而内自訟者也得位居尊有過而能自訟斯無愧於為君之道禹湯罪已正合此義蒙初六曰發蒙利用刑人用脫桎梏以往吝童蒙之時知識未明欲發其覆當如用刑而加之桎梏俾不得放逸可也若脫之以往則吝戾象曰以正法也正法者嚴以正其師法云耳欲知天心但看人心如何記得唐時一嵗㑹稽大旱遷市不雨祈山川庶神又不雨觴土龍舞巫覡愈益不雨或言有能捕退龍而譟之者召之至盡其術而旱復如故太守怒将擒治之術人遁去得其遺箧大書一紙曰人旱此語亦自有理治天下國家與一郡一邑不必屑屑求人之小過但擇其罪之尤者治一二輩足矣舜典言四罪而天下咸服所罪者止四人而天下之人莫不盡服罰當其罪則懲一可以勸百矣何必多殺前輩自警之際止是思量做人邵康節嘗言學為人之仁學為人之事吕舜從訓其子弟曰吾從賢士大夫游毎毎過相推重吾自省纔免禽獸之行而巳未能便合人之理也此語後生當先學做人却學做文章但患我不知人不患人不知我四㐫不知舜舜知四㐫少正夘不知孔子孔子知少正夘藝祖一日居殿中有小黄門塗糊其壁即欲斬之且曰此天之物也汝焉得損之正合舜禹有天下而不與之意又嘗露坐或諫以星月在上帝曰爾以為蔀屋之下星月所不及耶正合不欺闇室之意韓退之作方橋詩其言雖若鄙近考其意則大不凡曰非閣復非船盖以此自命曰可居兼可過喻其道之可以安天下而濟斯民也終言君欲問方橋方橋如此作則又斷然以有為自任此一篇詩意人多不察退之規模如此惜乎其不大用若杜子美言安得廣厦千萬間大庇天下寒士俱歡顔此志亦甚廣但不合露筋骨或問如何斯可以安心曰樂則安若早夜戚戚然以得失榮辱為慮雖一日亦不能安矣古人窮亦樂通亦樂未有其心不樂而能安之者也帝乙歸妹其君之袂不如其娣之袂良君者小君之君娣者其媵妾也嘗見前輩治家之法所謂主母者往往以淡薄自居而姬侍皆靚粧麗服亦有合易之遺意孔子見南子諾陽貨從佛肸之招赴公山之召所謂入鳥不亂行入獸不亂羣也孟子曰天下之言性者則故而已矣故者以言一性之真我之所固有非外加一物也言性而止於此則㡬於無所事事天理之妙何自而發之於用故又曰故者以利為本孟子曰聖人之於天道何謂天道如天命有徳五服五彰天討有罪五刑五用之類是也堯舜禹湯文武達而在上故能行天道孔孟窮而在下終不以命之不偶而廢天道是以作春秋以明一王之法著七篇以明仁義之道故曰命也有性焉君子不謂命也所謂仁之於父子義之於君臣禮之於賔主智之於賢者亦是此意孟子言舜為法於天下而不數堯禹及湯文者盖以舜當人倫之變而能每事盡道也以父子則有瞽瞍以兄弟則有象起於側陋而一旦立堯之朝則君臣之間為甚難以匹夫而妻帝之二女則夫婦之間為甚難與四㓙之徒羣居而雜處則所謂朋友者亦不可以一朝居也惟舜皆能處之以道故於人倫上了無一毫之累此其所以能為法於天下禪者論一百二十種心人只有一心自其能宰制萬物則謂之心君能經緯萬方則謂之心神其本則一而巳易曰一致而百慮所謂一致者心之常而百慮者皆其變也理致於極處直是説不得此夫子所以黙而識之曰予欲無言一念不動處雖鬼神亦窺伺不得而況於人乎故曰聖人藏於天先生曰向聞竹西王居正剛中論思無邪其説甚妙且如桑中墻有茨東門之枌之類皆具道閨房淫亂之事聖人乃不以為非者以其一念自正也故存其辭以勸戒後世後人謂聖人不能刪之乃留此以亂人之聴其説大謬道本無邪正自正人視之天下萬物未始不皆正自邪人視之天下萬物未始不皆邪昔有學道者久而未得一日聞市倡歌悲怨之辭因躍然大悟觀人之言繫乎心術之邪正如此夫子言之非特明作詩者之思慮不及於邪亦欲使讀詩者其心術不可不出於正也揚子言泰和在唐虞成周桀紂幽厲之時非無泰和但不在耳前輩謂共君一夜話勝讀十年書若果然於語下解得何翅讀十年書文章如美婦人可以傾人之城可以傾人之國然要𦂳在行事處文章誠不足道周勃霍光難字亦未必識而功盖天下人須是莫被文章使了惟聖人然後可以踐形未到聖人地位則不可盖形者耳目口鼻也彼欲如此而我從之是之謂踐如不反其言而謂之踐言不反其行而謂之踐行也目欲視吾不遏其視耳欲聴吾不遏其聴口欲味吾不遏其味鼻欲臭吾不遏其臭吾雖從是耳目口鼻之欲不随聲色臭味而去此夫子七十而從心所欲不踰矩也若顔子則非禮勿視聴言動勿者禁戒之辭此所以未達一間也樂菴語錄卷二
