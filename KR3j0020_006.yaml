body:
  text: 宋史本𫝊李衡字彥平江都人髙祖昭素仕至侍御史衡幼善博誦為文操筆立就登進士第授吳江主簿有部使者怙勢作威侵刻下民衡不忍以敲撲迎合投劾於府拂衣而歸後知溧陽専以誠意化民民莫不敬夏秋二稅以期日榜縣門鄉無吏迹而輸送先它邑辦因任歷四年獄戶未嘗繫一重囚隆興二年金犯淮堧人相驚曰寇深矣官沿江多送其孥衡獨自浙右移家入縣民心大安盜蝟起旁邑而溧陽靖晏自如帥江徹轉運使韓元吉等列上治狀詔進一秩尋召入為監察御史歷司封郎中樞密院檢詳出知溫婺台三州惟婺嘗涖其治加直袐閣而衡引年乞身懇懇不休上纍却其奏除祕閣修撰致仕上思其忠朴旋召落致仕除侍御史以老固辭不獲命差同知貢舉㑹外戚張說以節度使掌兵柄衡力疏其事謂不當以母后肺腑為人擇官廷爭移時改除起居郎衡曰與其進而負於君孰若退而合於道章五上請老愈力上知不可奪仍以祕撰致仕時給事中莫濟不書敕翰林周必大不草制右正言王希吕亦與衡相繼論奏同時去國士為四賢詩以紀之衡後定居崑山結茅别墅杖履徜徉左右惟二蒼頭聚書踰萬卷號曰樂菴卒年七十九衡自宣和間入辟雍同舍有趙孝孫者洛人也其父實師程頥家學有源勸衡讀論語曰學非記誦辭章之謂所以學聖賢也不可有絲毫僞實處方可以言學衡心佩其訓雖博通羣書而以論語為根本臨沒沐浴冠櫛翛然而逝周必大聞之曰世謂潜心釋氏乃能逹死生衡非逃儒入釋者而臨終超然如此殆幾孔門所謂聞道者與
