body:
  text: 樂菴語録卷一宋龔昱編先生曰宣和庚子嵗某以舍選貢京師入辟雍肄業率性齋同舍生趙孝孫仲修者洛人伊川先生髙弟趙顔子之子也於某有十年之長辛丑春同試南宫仲修中優選而某被黜落仲修勉之曰公盛年一跌庸何傷姑歸讀書可也且曰公曽讀論語否某意頗不懌即應之曰三尺之童皆讀此何必某仲修笑曰公既知讀此果曽從頭理會否且道學而時習之一句以何者為學某未知所對仲修徐曰所謂學者非記問誦説之謂非絺章繪句之謂所以學聖人也既欲學聖人不可有作輟之偽出入起居之時學也飲食遊觀之時學也疾病死生之時亦學也人須是識得造次必於是顛沛必於是立則見其參於前在輿則見其倚於衡方可以學聖人某聞其言頓若有悟請益曰為學之道敬聞命矣敢問事業何如仲修曰事業正自為學中來今且未要論大事只如作一郡若行得論語中三句便做箇好知州先生曰願聞之仲修曰道千乘之國敬事而信節用而愛人使民以時是也千乘之國若今之一州果能行此如何做得不好先生佩服其言每曰吾平生操心行已立朝事君皆趙公之言有以發之先生蚤嵗嘗問胡靖元績曰人皆悅生惡死死果足畏耶元績曰死何足畏人之所以畏死者無他只自惑於釋氏天堂地獄之説我若無罪何畏之有先生曰如何可使無罪元績曰但於顔子非禮勿視非禮勿聽非禮勿言非禮勿動處再三體驗自然無罪先生是其言常書之座右飲食起居以自省云或問如何是道先生曰世所謂學道者往往外求不知向外去又那得道若能於父子親於君臣義於夫婦和於兄弟敬於朋友信只此便是道何必他求今人更不去人倫上尋討但曰吾學道亦惑矣人理會得一箇誠字便是天理中人不可只作不妄語説中庸言誠則明孟子言反身而誠樂莫大焉到這般田地上多少快活僕曰畢竟如何先生曰别有甚難曉處只是一念不動若妄念一生便不是誠或問如何是天命之謂性先生曰此一句要説出之謂二字天命你的便是你之性不干天事揚子雲著書首言學行之上也學而不行與不學同今人讀書作文豈不是學至於聖賢事業則不能行所閲者紙上語耳何益於事瞿曇自謂從曠大劫來種種修行後來只得箇一念不動方能成道雖然如是若只守著一念不動乃是箇土木人易言寂然不動必繼之以感而遂通天下之故人須是理會得這箇道理或曰漢髙祖言陳平智有餘而難獨任五常中惟智不可有餘智有餘則流於小人所以難獨任先生曰豈獨智不可有餘仁有餘則流而為姑息義有餘則流而為忍人禮有餘則巽在床下信有餘則如尾生矣大凡作事只是適中便了若有餘於此則不足於彼人讀書須是識字固有讀書而不識字者如漢之孔光張禹唐之許敬宗栁宗元非不讀書但不識字或問其説先生曰孔光不識進退字張禹不識剛正字許敬宗不識忠孝字栁宗元不識節義字惟辟作威固是如此紂之作威殺戮豈不是作威乃以此得罪天下後世惟有德然後可以作威故曰德威惟畏學者當以心明經不當以經明經西都無三傑則四皓不得高卧東都無寇鄧則子陵不得終隱或問如何是天得一以清先生曰夫物不一而各有其一如日月之照臨星辰之輝粲風雷之鼓舞雨露之滲漉各有其一而不相亂天惟得此不一之一是以清淨無為而化推此言之地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下正亦只是這箇道理且如人君治天下亦何容心哉公卿大夫各依其等列士農工商各就其職分如此則尊卑貴賤不相混殽好惡取舍不相貿亂天下自然而治天地之性人為貴當作兩句讀宇宙之間一切所有之物皆具天地之性虎狼有父子之仁螻蟻有君臣之義雎鳩有夫婦之别鴻鴈有兄弟之序倉庚有朋友之情若此者豈非天地之性而人獨為貴者何哉物得其偏人得其全也或問孟子盡心之説先生曰一念不動便是盡心處或人未悟先生曰人生而靜天之性也感物而動性之情也人之真性了無一物一或翳之懵不之覺若不為物所動則妄念情欲廓然自除非盡心而何孔子曰朝聞道夕死可矣道是何物聞何所聞易曰通乎晝夜之道而知又曰原始反終故知死生之説只這箇便是道有生必有死猶有晝必有夜能通死生於一理則可以死矣人所以貪生惡死者無他只為不聞這箇道理孔子對顔淵問仁曰克己復禮為仁一日克己復禮天下歸仁焉必繼之曰為仁由己而由人乎哉堯舜非不克己而不能詔其子禹非不克己而不能諍其父周公非不克己而不能化其兄須是他自肯始得中體也庸用也體以居之用以行之中庸之義盡矣讀一部書須是識他宗旨如孟子一書宗旨在仁義上人之貧富貴賤吉凶夭壽莫不有命召公告成王曰若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歷年此數事固定於有生之初必曰自貽哲命豈所謂命者雖係於天而亦自我為之邪周之禮樂備於庶事之間如漢上之遊女無思犯禮伐條之婦人能勉以正衰世之公子信厚中林之武夫好德無非禮樂中和之發見者至秦併吞六國盡有三代禮樂之器揚子雲乃謂其庶事之不備者以其皆文具也曰心曰性曰天曰命此四物難為分别揮而散之一者為四斂而歸之四者為一王氏之學離伊川之學合昔有學無心者前輩謂之曰將學無心即有心矣求之六經曰存心也養心也治心也正心也知此然後可以無心聖人著書立言皆所以開導後學但一墮言詮未免一偏之蔽要當言語斷絶處默識而意會直方大固可與天地參然能直而不能屈能方而不能圎能大而不能細第可語顯諸仁而不可語藏諸用文章事業本無二理學者不可溺其偏一以貫之則無入而不自得論語謂子以四教文行忠信則文在所先又謂弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文則文在所後或先或後錯綜之義也是之謂一貫之學哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗子聞之曰成事不説遂事不諫既往不咎使民戰栗上又加一曰字即知非宰我對哀公之辭乃哀公自言也夫子聞之是以云云若是宰我錯説了夫子必直攻之大事固當理會須是更去小事上用心子思言致廣大而盡精微大者既無所不通於小事亦不放過如孔子自是天縱聖人鄉黨一篇舉足動步皆不敢忽故能􅊏悉盡善山谷嘗有詩戒少遊云才難不易得志大略細謹細謹誠不可略子貢嘗曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也子貢非特不聞性與天道夫子之文章亦未之聞日月星辰天之文也山川草木地之文也威儀文辭人之文也天地一元之氣亭毒於覆載之間故著為日月星辰散為山川草木聖人之盛德充實而有光輝故見面盎背施於四體發而為威儀文辭文章之與性天道豈二物哉既曰思道又曰無思既曰得道又曰無得方求悟時固當思固當得及其既悟則了無所思了無所得此入道淺深之候也子曰吾道一以貫之曽子曰唯至於論孝乃避席曰參不敏何足以知之夫道在我一唯便悟無容聲焉若論孝曽子非不曉必求夫子詳言之者豈欲因以詔天下後世邪以中庸大學雜置禮記中漢儒明經惟此一事可人意散文自有聲律如盤谷序醉翁亭記皆可歌韓退之送權秀才序云其文辭宫商相宣金石諧和即此可知矣栁子厚言儒者韓退之猶趙岐言儒家唯有孟子曽子啓手足之際告孟敬子曰人之將死其言也善但欲使孟敬子切於信已之説耳曽子之言何嘗一日不善豈特見於將死之時樂庵語録卷一
