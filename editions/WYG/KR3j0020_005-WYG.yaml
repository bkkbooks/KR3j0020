body:
  text: 樂菴語錄卷五宋龔昱編或人問地獄之説果有否先生曰不可謂有亦不可謂無皆由心之所生一念善處便是天堂一念惡處便是地獄且如人問崑山縣有獄否告之曰無你若殺了人便有獄矣地獄之説只是這箇道理人以生老病死為苦何其愚哉既寓形於宇宙間豈能免此且以瞿曇言之亦免生老病死不得只是不為他纒縛定著生亦恁麽死亦恁麽所易者形骸耳一㸃真性元不曽動又何苦之有大凡作事須是見事而不見人若但見人而不見事則輕重予奪皆不在我矣堯舜之世野無遺賢先朝説書謂賢者皆在朝若只恁地説則田野間不復有賢唐虞之盛風俗醇厚雖樵夫莫不談王道雖執耒耜者亦知歌頌聖人之盛徳以是知田野間往往皆賢者堯舜豈能盡用之今曰野無遺賢乃是不遺其大者如臯夔稷契諸公是也若其餘如何収拾得盡六經之作皆可以書名惟易不可以書名詩寓美刺書紀政事春秋正名分之常禮樂究中和之本皆可目之以書至於易則窈無定名随寓随在故有一身之易有萬物之易有天地之易道在一身即一身之易道在萬物即萬物之易道在天地即天地之易雖書而實非書男女不雜坐不同椸架不同巾櫛不親授男女不雜是一句若如此讀則下文皆通坐不同男女之坐不同也椸架不同男女之椸架不同也巾櫛不親授男女之巾櫛不親授也老氏言聖人處無為之事事須是處置得下方可無為如舜命九官咨四岳天下事皆一一處置了然後能恭已南面孟子曰人能無以饑渴之害為心害則不及人不為憂矣如孔子視富貴如浮雲孟子謂萬鍾之祿於我何加使其富貴過人尚如此況不及於人必無憂愁憤鬱之歎四科非夫子自立夫子平日稱門弟子皆以名如回也賜也商也師也由也求也之類惟四科盡以字稱而曽子獨不與諸弟子中自顔淵之外惟曽子能心𫝊夫子之道况夫子平日未嘗與羣弟子終日說一段話孝經十八章終始皆為曽子説四科之目恐是曽子品題耳或問可與共學未可與適道可與適道未可與立可與立未可與權次第果何如先生曰有志於學者可與共學見善眀者可與適道用心剛者可與立至於權則變動不居周流六虚非造乎時中之地者則不可荘子言人相忘於道術道喻大事術喻小事事之大小雖不同皆當相忘於無心相忘者不去計較觸著便做老氏言慈故能勇如舜孳孳為善想其氣象必是箇温良恭順底人乃能誅四凶夫子鄉黨一篇分眀在春風和氣中忽然便去誅少正卯慈而不能勇只是姑息不知姑息害事前輩言莅官處有三莫之説事来莫放事去莫尋事多莫怕堯舜自信於為善桀紂自信於為惡以名論之相去甚逺若一念純正反為惡之心為善桀紂便是堯舜大凡做事疑則勿為為則勿疑司馬温公清修寡欲家無曳綺之妾而婢僕之禁甚嚴一日有客自輪盤隙中窺見一婢蓬首垢面形状疙瘦如鬼不覺驚歎乃知前輩持家嚴内外之分如此有門人侍坐因論熈豐間事極口詆毁王介甫至不以人類待之先生徐謂之曰荆公長處甚多亦不易得方其執政時豈有意壊亂天下第所見有不到處故温公曰介甫無他但執抝耳此言正中荆公之病可謂公論諸公尚論前輩止可辨是非不當斥罵如此宜戒之先生一日讀老子至出生入死章大悟游戲生死之道因自言曰所謂生之徒十有三此畏死而欲長年者死之徒十有三此輕生而樂寂滅者動之死地亦十有三此不學㝠行而顛頓於生死之塗者是三者皆非中道彼善於此則有之矣易論天地之數自一而至十則十者陰陽之成數老氏獨缺其一此何意也盖道生一一者形變之始乾元用九妙萬物而不役於物者也故天得之而清地得之而寧老氏闕之者聖人之得一者也聖人得此則翕張造化游戯生死今州縣但患財賦不足更不去政事上理㑹孟子曰無政事則財用不足此語最是理財之策紹興間官不至冗者盖得所以省官之術五府恩例甚大除一人則恩賞可及十數人當時五府之官未嘗備下至侍從及卿監郎官之屬亦不盡置至有一人兼數職者故除授不至猥濫毎路監司多闕而職司亦罕除故改秩者自難凡此皆省官之要術人之敬心不可須臾離前輩雖平居無事猶儼然危坐對家人婦子亦如此今人習於惰慢見鄉里長上猶且不敬其在閨門之内可知矣髙才之士易得純徳之士難得或言冠婚䘮葬不可外隂陽之說先生曰吉人吉其凶凶人凶其吉遺事附先生曰吾年未六十已絶欲至六十三嵗先妻王氏亡諸子哀號至不忍聴吾意極亡聊不能解釋私自尤曰學道四十年今日憂患反不能排遣何耶因讀揚子雲見善眀用心剛之語乃大喜曰茍用心不剛不免為境所轉然不礙我正見吾今胷中固已了然所恨者力未至耳自是日夕窮究性命死生之理晩年益覺有進憂樂禍福不復動心矣先生年㡬八十神彩煥然每對賔客議論超偉僕一見之必曰先生精神如此福祿必未艾先生曰不然吾根本稍固故精神自然發見如此縦饒眀日死今日精神也只如此未逝前一日其姊入診之喜曰精神若是亦何慮耶先生笑曰平生學道正欲凝神以觀化耳翼日捐館先生每見貧困不能為生者則與之錢粟又嘗持不殺戒曰此非所以為仁也但要熟一念耳先生每見有精於藝術者則慨然曰無乃謬用其心茍移此心而學道何所不至先生所至授徒其教人無他術但以論語朝夕討究能參其一言一句者莫不有得或曰李先生教學且三十年只是一部論語先生聞之曰此真知我者太宗欲相趙普或譛之曰普山東學究惟能讀論語耳太宗疑之以告普普曰臣實不知書但能讀論語佐藝祖定天下才用得半部尚有一半可以輔陛下太宗釋然卒相之又有一前輩平生蓄一異書雖子弟莫得見及其終發箧以視乃論語一部此書誠不可不讀既讀之又須行之先生自幼講眀道學中年以後絶欲清修惟二蒼頭侍側奉養極淡薄居南床未久以言不得用掛其冠而歸於崑山南六里架屋數間種竹二畆號樂菴時往来其間日取六經論語孟子讀之朝暮不少憩嘗語人曰吾讀後世書耳每坐則焚香酌茗與諸子及門弟談道徳性命之學衮衮不休聚書萬卷圖畫滿室每閲以寓意而已家事悉付之子弟不復闗心父子相視如師友毎言吾投老得官身歴清要朅来此邦且四十年有田可耕有廬可居年垂八十幸無疾疢分已過矣即死無憾淳熈戊戌夏微覺不喜食即櫂扁舟徃樂菴一榻翛然絶無人聲時諸子侍旁先生與之言曰修竹滿前對此待盡有何不可每旦入問安否先生曰吾略無所苦遂舉兩臂示之曰浸假而化予之左臂以為雞予因以求時夜浸假而化予之右臂以為彈予因以求鴞炙吾亦待觀化一巡時女兄亦来問疾先生曰某将死老姊無庸憂人之死生如晝夜生處便是死處死處便是生處若恁地理㑹得又那得生死語竟即取紙數十幅為手簡徧别親舊又以錢米分恵貧者無一遺忘已而作遺訓示諸子曰吾寓形宇内七十九年蚤雖困於百罹晩僅全於五福死期既至勢不復留雖一念不生本無去来而四大假合終歸腐敗瞑目以後當付囑者今具畫一嗣宗輩各仰遵守一此間土薄水淺因循不曽辦得直裰謾試圖之以小為貴僅能周身足矣其間不置一物雖冠裳亦無用只裁一摺席藉背可也一汝祖父母安厝皆有棺無槨只以磚砌覆之石版足矣七七或百日内不須選日便埋埋了就家中供養一親識賵贈依例收留第經錢與折祭之類一文以上不可受一僧道禮數雖經疏亦不可受若欲靈前持諷則又大不可但以此示之一應干錢米支收文字在厨櫃中今嵗田産可便五分分撥以一分抄上周急簿逐年輪一兄弟掌管給施取吾簿上意㫖刻石菴中令項樁管置歴收支如成娘之類嵗撥數十千與作營運遲之嵗月何有不辦如此等孤遺皆當振䘏一吾既往之後嵗時祭祀随家豐儉由禮可也若齋一貟僧念一聲佛非吾子孫此意是真報佛是真供養上士聞之當不復疑中下驚怪非所恤也右六事皆吾治命不得違戾吾平生性命道徳之學治亂安危之策不獨載之空言亦粗見之行事今既永訣豈容緘黙戯説偈曰竿木随身得自由應縁已畢復何求翛然来往等孤鴈影落寒潭迹不留書訖且語諸子曰吾本欲便往為天氣不爽姑少留以俟月上汝輩候吾死即斂斂巳方使家人知不欲死婦人手也切不可用庸巫課隂陽諸子聞其言遂微泣先生曰吾死汝輩何憾焉用哭平生與爾説箇甚麽諸子應之曰死生之理固自曉然但父子天屬也情不能自遏先生曰若是為父子後哭饒爾三十柱杖及夜沐浴遂冠櫛起坐精神自若了無欠伸意至二鼔倐然而逝時六月二十三日也諸子恐怛化不敢遽哭家人女奴絶未有至者惟諸子及二蒼頭在旁是夕風月清美如陽春髙秋天宇湛然萬籟沉寂不類人境識者知先生之逝决非與萬物同盡者先是嘗語監征王琛曰吾可漏子已有頓放處矣豈非先知者耶先生平日劇談道學每語諸公看我臘月三十日好好做箇散場聞者憮然樂菴語録卷五
