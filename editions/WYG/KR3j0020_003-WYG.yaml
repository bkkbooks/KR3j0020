body:
  text: 樂菴語錄卷三宋龔昱編一日召對選徳殿奏事畢上因與論禪乃奏云所謂禪之説儒家亦有之但今人只於釋氏留意殊可怪昔周公亦坐禪惟孟子能知之上愕然又徐奏曰周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦豈非坐禪乎天下只有一理周公平日坐而思之者無非愛人利物之事只此便是佛心何湏更問禪上頷之易曰不家食吉養賢也非是使賢者盡禄於公室而不食於其家言人君能養一賢者則天下之民皆得以耕食而鑿飲仰事而俯育謂生育之賜廣大如此非家至而食之也若欲家至而食之是殆齊桓公遺老人食之類也人之一性雖是本来髙明然亦當盡其在我者不然則聖賢立言何以曰尊徳性曰防民性曰節性曰養性曰修性舊人説性不可修此語直是誤人孝經言嚴父配天必稱周公自古聖人大孝如舜達孝如武王皆不及之而獨眷眷於周公者以周公人臣耳而獨用天子之禮樂以褒大其親正所謂立身行道揚名於後世以顯父母也故夫子取其孝之終聰明智慧不是博極羣書亦不是議論過人亦不是事事剖判得此性湛然如明鏡止水物雖千變萬態来則見之此真聰明真智慧也文王不識不知順帝之則古人前旒蔽明黈纊塞耳皆所以見其不自用也東坡言我被聰明誤一生此雖戲言然亦有理韓魏公嘗言保初節易保晩節難在北門九日燕諸曹詩有曰莫羞老圃秋容淡要看寒花晩節香先生深敬此語嘗大書於壁以為晩節之規易曰舎爾靈龜觀我朶頥觀我者自他人言之也爾一㸃靈性中萬物皆備却不自去理㑹只来看我看我富貴利達便奔趨求媚如此則朶爾之頥矣正如劉禹錫諸公附王叔文而終不免於竄斥崇觀間朝廷禁元祐學甚切皆號為頗僻之文舉子在學校及場屋一字不敢用雖碑刻亦盡仆之時錢塘有一遊衲以隠稅逮繫於州發箧得詩稾數編首篇哭東坡其辭曰文星落處天為泣此老已亡吾道窮功業漫誇生仲達文章猶忌死姚崇人間便覺無真氣海内何由見古風平日百篇誰復愛六丁收拾上瑶宫守見而竒之因釋其罪前輩謂治平之世則公議在廟堂上無道揆下無法守則公議在草茅斯言信哉理之所在未有不思而得者周公思兼三王以施四事其有不合者仰而思之夜以繼日孔子曰吾嘗終日不食終夜不寝以思無益不如學也周公孔子可謂是大聖人毎一舉事必思而後行今人或當煩劇或於文字疑難更無箇道理處置此但不思耳思則得之管子曰思之思之又重思之思之而不通鬼神将通之非鬼神之力也精神之極也陳了翁一日往某處或言此間有一得道者可就見之了翁曰他自得道干我甚事此便是了翁過人一著處這段事須是自家自去理㑹如何倚靠得人古云任賢使能任使二字極有輕重賢者須委任之而後可以共治如髙祖用子房之徒是也能者則役使之而後可以成功韓彭黥布之徒是也仰之彌髙鑽之彌堅瞻之在前忽焉在後顔子之學夫子其心甚苦見夫子只在前面力之所至所爭亦不多只是未能趕得上故揚雄稱顔苦孔之卓大凡作事只依箇道理行便了切不須作意且如當官處合徒則徒合杖則杖不以喜怒為輕重所謂觀於天布不助者也順逆之境一也世之昧者方居順境則逐物而失身迨遭逆境則執我而䘮志惟智者處之以無心故窮亦樂通亦樂春秋一經雖曰紀諸侯之事其實為人君作周既東遷王政不綱禮樂征伐自諸侯出其下自大夫出又其下自陪臣出天下不知有王室乆矣夫子傷之因魯史而作春秋特書王字於元年之下既責當時諸侯禮樂征伐不得其正又責周王不能自正其本也此意惟董仲舒知之故曰春秋深探其本而反自貴者始詩序言美教化移風俗惟能美教化然後可以移風俗若教化不美非獨不能移風俗天下反為風俗所移矣如曹風之奢晉風之儉不中禮皆足以移人教化之不美其敝必至於此子夏曰日知其所亡月無忘其所能古亡無字通日知其所無者凡欲學而未至者也月無忘其所能者已學而得之者也君子教人於其所未學則切切然日以為念於其所已學則一月之間須常自省也如此則學安得不進故親生之膝下以養父母日嚴此正孩提之童無不知愛其親之説人生在齠齔其身在父母膝下此時便有愛親之心及其長大成人斯能養父母而敬心日生焉人之天性如此先生曰向守婺女有學者贄文求見因問作詩活法遂贈之詩曰學詩如參禪初不在言句傴僂巧承蜩梓慶工削鐻借問孰師承妙處應自悟向来大江西洪徐暨韓吕山谷擅其宗諸子為之輔短句與長篇一一皆竒語卓爾自名家無愧城南杜君詩亦可人羞作女工蠧正臨百尺竿到此方進歩我性文字空志在學農圃老矣甘摧頺肯復事雕組少讀三百篇每自歎無補一念絶邪思得處忘我所學詩如參禪無舎亦無取立雪謾齊要斷臂徒自苦君欲問活法活法無覔處大凡議論若一處見得透則處處皆通盖縁是天下只一理王荆公讀盡天下書只是不曽見道曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎𫝊不習乎曽子自思量我身上别無不是事故每日所三省者只這般事可謂㸃檢得盡又不止平日如此雖臨死時亦戰戰兢兢如臨深淵如履薄氷若論克己工夫須是還他曽子易曰凡益之道與時偕行時者天理也欲加人力須是天理上去得方可若於天理相反處如何便可加以人力王用享於岐山要説出用字受命作周用也爰整其旅以遏徂莒用也築城伊域作豐伊匹用也勉勉我王綱紀四方用也文王之見於用者如此方其在岐山時巳自享了豈待膺天命撫方夏之後耶登孔子之門者三千人其間絶類離倫若顔閔之徒始列於四科然回能仁而不能久由能勇而不能怯賜能辯而不能訥師之過商之不及才之難全如此及顔淵問為邦則告以四代禮樂季康子問子貢子路冉求可使􅀙政則曰賜也逹由也果求也藝於従政乎何有至於子貢問政子張問政則又皆以至言妙道許之乃知聖人與人亦未嘗求備喜怒哀樂未發之謂中寂然不動之時也發而皆中節謂之和感而遂通之時也陳蕃言大丈夫當洒掃天下安事一室此語殆非確論聖人謂居家理故治可移於官又曰家齊而後國治國治而後天下平況洒掃應對即聖人致知格物事若小處做得鹵莽大處可知矣顔淵問仁夫子告以非禮勿視聴言動仲弓問仁告以出門如見大賔使民如承大祭樊遲問仁告以居處恭執事敬夫子答門弟子之問雖曰各随其資禀至於問仁則多答以敬乃知學者之求仁當自敬入道一而已而以修身為本自修身以及於治國平天下皆是道也蒙荘乃曰道之真以治身緒餘以治國家土苴以治天下道烏有精粗由小以至大自近以及逺其序當然孟子曰天下之本在國國之本在家家之本在身與斯言異矣忠孝本非二事孔子曰夫孝始於事親中於事君又曰事親孝故忠可移於君又曰資於事父以事君而敬同祭義載曽子言曰事君不忠非孝也涖官不敬非孝也戰陣無勇非孝也忠與孝豈二事哉要之忠以孝為本未有孝而不忠者古人謂求忠臣於孝子之門又曰孝立則忠遂可謂能識聖賢之意若謂忠孝不兩立如王陽王尊之論則不可樂菴語錄卷三
