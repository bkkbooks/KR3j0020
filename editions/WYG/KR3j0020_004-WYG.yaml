body:
  text: 樂菴語錄卷四宋龔昱編蠱之初六言幹父之蠱有子考无咎九二言幹母之蠱不可貞九三言幹父之蠱小有悔无大咎六四言裕父之蠱往見吝六五言幹父之蠱用裕此五爻皆言幹蠱之事至上九則曰不事王侯髙尚其事象曰不事王侯志可則也後人往往引四皓子陵解此一爻竊以為大不然出則事公卿入則事父兄不事王侯髙尚其事此素隱行怪者之所為也禮曰八十者一子不從政九十者其家不從政上九處卦之終當父母耄期之時不出􅀙政非所以邀譽於郷黨朋友非惡干禄而然盖知尊尚孝徳者也曽子居魯齊欲聘以為卿曽子曰吾父母老不忍逺親以為人役斯人也真百世之師故其象曰志可則也易曰健而說决而和以言君子之於小人可去則去之可殺則殺之未嘗有心以勝之也方其去之殺之之時人見其為健且决而不知君子之心本未嘗動健固無損於吾之說决亦無損於吾之和也昔韓魏公鎮北門有一兵罵朝城令事上公府公問信否曰當時乘忿實有言公即於解状判處斬􅀙容平和略不變色衆見其投筆方知有異若魏公者可謂能合大易之㫖矣作文須要鍊意鍊意而後鍊句鍊句而後鍊字不可輕易拈出頃見東坡梅花辭藁塗抹殆盡天才尚如此況强勉學為文章者哉事之究竟處只一箇是字道理既是看如何也撲不破楊子曰學者審其是而已若不是便不可做舜察於人倫者謂舉動之間須是子細推尋這道理若差了一絲毫便壊了天来大事禮記三十卷首言毋不敬佛氏五百大戒只此三字盡之毋不云者十二時中行住坐卧皆能敬其事如鄉黨一篇便是道非事不形事非道不行𫝊註之學有利有害須是自做主張方可小人無知但要勝人君子則不然使之不能勝己便是勝人聖即是狂狂即是聖念否之間耳道理之學口頭説得不濟事故孟子曰必有事焉前輩謂胷中無藻鑑不可讀書鬼神之心便是我之心我做處若善必隂隲黙相做處若不善神必悔怒故曰聪明正直依人而行莊子理學既好文章又好人須是規模廣唐史謂憲宗任裴度為難吾以為不然憲宗與裴度心志契合一旦用之以責成功其事甚易史臣視之以為難耳釋氏稱無量壽佛佛在甚處自家一念不動在太極之下不為深先天地生不為久長於上𤣥不為老此外更有甚無量壽佛空之説須當子細體解若世間所有之事皆離而不親世間所有之物皆棄而不欲以此為空則謂之頑空當事物紛擾之中能一念不動即便空了豈待勉强與物哉吕吉甫讀莊子至㕘萬歳而一成純遂頓悟中庸曰茍不至德至道不凝焉周禮曰至德以道為本不以德言道非儒家説也禹大聖人也方治水之時尚不能究河之所從來但曰導河積石而不言其自張騫乃欲窮河源何哉書言上帝降𠂻于民若有常性荀卿乃以為惡禮運言禮本於天荀卿乃以為偽前輩讀書甚刻苦范文正公就學南都時晝夜觀書不絶以粥一器畫而四之饑則取食日以為常錢明逸妙年中制科始學於山房遇天寒取其所為藁􅅡之俟其氣稍温即就寑今之學者豈能如此前輩謂作文如家書但責平易何嘗作急造語昔王岐公作元宵應制詩章子厚問使甚事公曰使鼇山鳯輦事章意以為陳腐且疑為所紿詩成果用此二語所謂雙鳯雲中扶輦下六鼇海上駕山來是也章嘆服以為不可改事雖平易只是安排得好此作文之法也王剛中嘗言士之為學當如商賈治財入者多出者少此語最妙若不務讀書而専意作文字有甚意味文章以意為主亦以誠為主茍不出於誠意便是亂道且如做詩老便説老貧便説貧若未老説老不貧説貧便不是誠意張子韶樊茂實論作時文云每得一題先於一篇中求之一篇中求之不得又於上下文求之上下文求之又不得廼就一句上生意作文須要悟入處無悟入處一辭不能措雖能措辭亦無意義戰國之時楊墨塞路唐之時佛老害道民生斯時如墜塗炭莫有舉而出之者孟韓二公不忍天下之人坐困如此是以卓然揭仁義之道舉而出之塗炭之中其有功於名教多矣故曰舉天下於仁義莫若儒有諸巳之謂信此一句孟子説得分曉須是自家能省得我所固有者如此然後信得及若無知之人謂聖人别是箇人孰肯自信我與聖人同此下士聞之所以大笑也父子因縁不偶然須是前生曾結得來其間有好者是結得好因縁有不好者乃是一時相愛更不曾子細契勘如堯有丹朱舜有商均豈是堯舜不積德當時結了這因縁便來作父子且如人家養婢僕有得心力底主人必愛之下至猫犬主人亦有愛者彼此若一念動便來作眷屬無疑好人亦如此馬忠肅公居維揚時近居有一禪刹公嘗於諸僧中擇其年老而能自修者一二輩與之交逰甚宻公初無子俄自喜曰今得之矣未久有二僧死遂與公為父子這箇道理甚顯然人之為善不可出於有心有心於為善則與為不善同昔人有嫁女者曰爾行矣謹毋為善曰將為不善耶曰善且不為况不善乎處心到這裏方可樂菴語録卷四
