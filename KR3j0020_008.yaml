body:
  text: 樂菴語録後跋太平全盛時三光五嶽之氣未闕厚與今不同況賢於人者哉余自幼侍先尹相山及諸叔父行見其年餘七十率皆彊健不甚服溫補藥余兄弟嘗自斟酌氣血已為弗類今見子姪輩才二三十歲往往餌雄附如常膳又逺不逮吾曹矣以此較彼無怪乎人物之卑弱也相山年七十有七前知死期當盛暑中了無疾苦揮扇坐逝是其平生為人清明剛正之所發見非强勉積習而然今觀樂菴李公遺墨而稽其行事蓋吾相山一等人皆生於太平而經厯兵火憂患仕路齟齬摧挫抑厭有人所不能堪而氣至死不屈可以見其中之所存夜旦去來自應不亂亦何待學佛而後有所得哉公位不滿德四子皆從宦而兩子以才學自致所謂不在其身而在其子孫者甥陳振少孤養於公家亦登科第今為余壻云紹熙辛亥九月辛酉無為王藺書世俗以了悟生死為禪僧衲子一希世異事殊不知吾夫子負手曳杖之歌曽子易簀反席之際蓋吾儒之所優為者侍御先生理學之妙見於踐履及處死生之變若將歸焉其超然冥悟殆禪衲之所不如非學力所至獨可强哉觀其治命以供佛齊僧為戒則先生所得蓋在此而不在彼明矣僑於先生為門下士得邑兹來雖不及侍杖履而猶得誦遺書於闕里之藏再拜三復輒疏於後庶幾發揚先生誠明之學始終踐履之實如此吾黨觀之可以默喻云紹興辛亥仲春中瀚吳興孫僑謹書侍御先生李公年踰七衮孝宗皇帝起公於家擢首風憲一旦節度使張說本兵柄抗章五上與天子意不合翩然而去當血氣既衰之年略無一毫利祿之念暨將逝之日遺命以戒子孫泚筆以别新故雍容暇裕初無異於平時又何其了達如是耶嗟夫人之所以通乎死生之間者惟一心爾喜與悲一物也覺與夢一致也此心動搖於利害得喪之場則必眩惑顛冥於變故之際果能以浮雲視富貴則自能以晝夜視存亡曳杖而歌易簀而逝兹豈一時勉强所能至孔門義命之學處死則為重視死則為輕久矣今公優游以觀化整暇以歸全後日之心即前日勇於去國之心也是烏可以二觀之哉洚居僻而生晚雖不及侍杖席聆謦咳而公之孫溍出示公之壙志遺墨石刻反覆莊誦既以見公始終之大略而且以知人心之果不可以無定守也嘉定甲申季秋上瀚建安後學游洚謹書孔子曰朝聞道夕死可矣是理也載於易繫辭雜出於禮經三代時佛教未入中國儒者於啓手足之際往往不亂此理素明也及漢晉之後釋教始行乃謂欲達生死之理非潜心釋氏不可故好之者心溺攻之者辭費盍亦反求其本而已豫與樂菴李彥平既親且舊知其非逃儒而入釋者臨終超然自在如此殆聞道乎其子嗣宗等屢求一言發明遺訓敬題其後平園周必大題樂菴先生少年豪放任俠抵掌功名之場及其獨抱聖經坐進此道遂知死生之說於去來起滅之際逍遙如此蓋所謂未有天地自古固存者先生既自得之彼去來生滅特旁觀所見云爾何足以窺先生之具况諄諄遺令之細耶石湖范成大書孔子曰朝聞道夕死可矣蓋道者日用常行之理茍聞之則雖死無憾又曰未知生焉知死蓋生之道有所未知則何暇於死二者皆盡其所當聞所當知而死非其所計也昔者先大父好學聞善如恐不及宰長洲時公為他邑簿聞其學而學焉公聞道於程門之學者惠愛著於再領中山之日直節見於立朝去國之時而於死生之際了達如此亦可謂卓然不惑者矣自程氏沒而諸弟子得其傳者類有見於死生之大節而不能無坐忘立脫之偏至文公興於閩南軒作於湘而後孔孟之論始定然而學者能如渡江諸賢所見者鮮矣可不懼乎可不懼乎嘉熙丁酉孟秋仲浣後學王遂煒韋布時從樂菴游最䝉奬知樂菴沒於淳熙之戊戌聞其屬纊之前貽書親朋治命子孫留意周急了如平時後十有四年始獲觀遺墨於無為之漕舍烏乎鍾鳴漏盡之際士大夫聞道之淺深見矣至於逆知其期湛然不昧如樂菴者自邵康節之後一人而已拊卷三歎於是乎書紹熙辛亥夏至秣陵劉煒
